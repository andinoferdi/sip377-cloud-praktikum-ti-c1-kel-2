openapi: 3.0.3
info:
  title: GAS Backend API v1 - Presensi QR Dinamis, Telemetry, GPS
  version: 1.0.0
  license:
    name: Academic Use Only
    url: https://creativecommons.org/licenses/by-nc/4.0/
  description: |
    Backend API built on Google Apps Script (GAS), deployed as a Web App.
    Routing uses query parameter `?path=`.
    Response envelope:
    - Success: `{ "ok": true, "data": ... }`
    - Error: `{ "ok": false, "error": "..." }`
    Presence error codes:
    - `token_invalid`
    - `token_expired`
    - `already_checked_in`
    - `session_closed`
    Presence matching notes:
    - `course_id` and `session_id` are normalized to lowercase before matching.
    - `qr_token` is normalized to uppercase before matching.
    Modul 2 Accelerometer notes:
    - POST route: `?path=telemetry/accel`
    - GET latest route: `?path=telemetry/accel/latest`
    - Batch payload requires `device_id` and non-empty `samples[]`.
    - Each sample requires `t`, `x`, `y`, and `z`.
    - Batch success response returns accepted sample count in `data.accepted`.
    - Latest response returns newest sample (`t`, `x`, `y`, `z`) for the requested `device_id`.
    This deployment is API-only and does not serve HTML dashboard.

servers:
  - url: https://script.google.com/macros/s/{deploymentId}/exec
    description: Google Apps Script Web App
    variables:
      deploymentId:
        default: AKfycbzVJ1--9eMNpaPC7JcyPQsdbkOPkkKMq3PdUuFeHJKSQ5fTw7OahhjbXy1f4V0XMMeTtA
        description: Web App deployment ID

security: []

tags:
  - name: Modul 2 - Accelerometer
    description: |
      Endpoint virtual untuk modul 2 accelerometer:
      - `POST ?path=telemetry/accel`
      - `GET ?path=telemetry/accel/latest`
      Semua response mengikuti envelope standar:
      - success: `{ "ok": true, "data": ... }`
      - error: `{ "ok": false, "error": "..." }`

paths:
  /exec:
    get:
      summary: Multi-purpose GET endpoint (routed by `path` query)
      operationId: doGet
      tags:
        - Modul 2 - Accelerometer
      description: |
        Router GET tunggal berbasis query `path`.
        Untuk modul 2 accelerometer gunakan:
        - `?path=telemetry/accel/latest&device_id=...`
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
            enum:
              - presence/status
              - presence/list
              - presence/sessions/active
              - presence/course/config
              - telemetry/accel/latest
              - telemetry/gps/latest
              - telemetry/gps/history
              - ui
          description: |
            Virtual route selector. Empty/default and `ui` both return API metadata JSON.
        - name: user_id
          in: query
          schema:
            type: string
          description: Required when path=presence/status
        - name: owner_identifier
          in: query
          schema:
            type: string
          description: Required when path=presence/sessions/active
        - name: course_id
          in: query
          schema:
            type: string
          description: Required when path=presence/status, path=presence/list, or path=presence/course/config. Optional filter when path=presence/sessions/active. Matching is case-insensitive.
        - name: session_id
          in: query
          schema:
            type: string
          description: Required when path=presence/status or path=presence/list. Matching is case-insensitive.
        - name: device_id
          in: query
          schema:
            type: string
          description: Required for telemetry latest/history endpoints
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 200
          description: Optional max items for path=presence/list, path=presence/sessions/active, or path=telemetry/gps/history
        - name: include_stopped
          in: query
          schema:
            type: boolean
            default: false
          description: Optional for path=presence/sessions/active. If true, response includes both active and stopped sessions.
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Optional ISO-8601 start time for path=telemetry/gps/history
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Optional ISO-8601 end time for path=telemetry/gps/history
      responses:
        '200':
          description: JSON envelope response
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/AccelLatestEnvelope'
                  - type: object
              examples:
                apiInfo:
                  summary: Default / path=ui metadata
                  value:
                    ok: true
                    data:
                      status: ok
                      mode: api_only
                presenceStatus:
                  summary: path=presence/status
                  value:
                    ok: true
                    data:
                      user_id: "2023xxxx"
                      course_id: "cloud-101"
                      session_id: "sesi-02"
                      status: "checked_in"
                      last_ts: "2026-02-18T10:01:10Z"
                presenceList:
                  summary: path=presence/list
                  value:
                    ok: true
                    data:
                      course_id: "cloud-101"
                      session_id: "sesi-02"
                      total: 2
                      items:
                        - presence_id: "PR-0002"
                          user_id: "20230002"
                          device_id: "dev-002"
                          ts: "2026-02-18T10:01:20Z"
                          recorded_at: "2026-02-18T10:01:20Z"
                        - presence_id: "PR-0001"
                          user_id: "20230001"
                          device_id: "dev-001"
                          ts: "2026-02-18T10:01:10Z"
                          recorded_at: "2026-02-18T10:01:10Z"
                activeSessions:
                  summary: path=presence/sessions/active
                  value:
                    ok: true
                    data:
                      owner_identifier: "198701012020011001"
                      total: 2
                      items:
                        - course_id: "cloud-101"
                          session_id: "cloud-101-p01"
                          meeting_key: "MTG-CLOUD-101-P01"
                          owner_identifier: "198701012020011001"
                          status: "active"
                          started_at: "2026-02-28T09:26:00.000Z"
                          updated_at: "2026-02-28T09:28:00.000Z"
                          stopped_at: null
                        - course_id: "cloud-101"
                          session_id: "cloud-101-p00"
                          meeting_key: "MTG-CLOUD-101-P00"
                          owner_identifier: "198701012020011001"
                          status: "stopped"
                          started_at: "2026-02-21T09:26:00.000Z"
                          updated_at: "2026-02-21T09:40:00.000Z"
                          stopped_at: "2026-02-21T09:40:00.000Z"
                courseConfig:
                  summary: path=presence/course/config
                  value:
                    ok: true
                    data:
                      course_id: "cloud-101"
                      total_meetings: 14
                accelLatest:
                  summary: path=telemetry/accel/latest
                  value:
                    ok: true
                    data:
                      t: "2026-02-18T10:15:29.300Z"
                      x: 0.15
                      y: 0.02
                      z: 9.68
                accelLatestEmpty:
                  summary: path=telemetry/accel/latest (device tanpa data)
                  value:
                    ok: true
                    data: {}
                gpsLatest:
                  summary: path=telemetry/gps/latest
                  value:
                    ok: true
                    data:
                      ts: "2026-02-18T10:15:30Z"
                      lat: -7.2575
                      lng: 112.7521
                      accuracy_m: 12.5
                gpsHistory:
                  summary: path=telemetry/gps/history
                  value:
                    ok: true
                    data:
                      device_id: "dev-001"
                      items:
                        - ts: "2026-02-18T10:15:00Z"
                          lat: -7.2570
                          lng: 112.7515
                        - ts: "2026-02-18T10:15:10Z"
                          lat: -7.2572
                          lng: 112.7518
        '400':
          description: Error envelope
          content:
            application/json:
              examples:
                accelLatestMissingDevice:
                  summary: path=telemetry/accel/latest tanpa device_id
                  value:
                    ok: false
                    error: "missing_field: device_id"

    post:
      summary: Multi-purpose POST endpoint (routed by `path` query)
      operationId: doPost
      tags:
        - Modul 2 - Accelerometer
      description: |
        Router POST tunggal berbasis query `path`.
        Untuk modul 2 accelerometer gunakan:
        - `?path=telemetry/accel`
        Body wajib JSON dengan `device_id` dan `samples[]` non-empty.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            enum:
              - presence/qr/generate
              - presence/checkin
              - presence/qr/stop
              - presence/course/config
              - telemetry/accel
              - telemetry/gps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GenerateQRRequest'
                - $ref: '#/components/schemas/CheckinRequest'
                - $ref: '#/components/schemas/StopSessionRequest'
                - $ref: '#/components/schemas/CourseMeetingConfigUpdateRequest'
                - $ref: '#/components/schemas/BatchAccelRequest'
                - $ref: '#/components/schemas/LogGPSRequest'
            examples:
              accelBatchRequest:
                summary: path=telemetry/accel
                value:
                  device_id: "dev-001"
                  ts: "2026-02-18T10:15:30Z"
                  samples:
                    - t: "2026-02-18T10:15:29.100Z"
                      x: 0.12
                      y: 0.01
                      z: 9.70
                    - t: "2026-02-18T10:15:29.300Z"
                      x: 0.15
                      y: 0.02
                      z: 9.68
      responses:
        '200':
          description: JSON envelope response
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/AccelBatchEnvelope'
                  - type: object
              examples:
                generateQR:
                  summary: path=presence/qr/generate
                  value:
                    ok: true
                    data:
                      qr_token: "TKN-8F2A19"
                      expires_at: "2026-02-18T10:02:00Z"
                      meeting_key: "MTG-CLOUD-101-P01"
                checkinSuccess:
                  summary: path=presence/checkin
                  value:
                    ok: true
                    data:
                      presence_id: "PR-0001"
                      status: "checked_in"
                checkinError:
                  summary: checkin error
                  value:
                    ok: false
                    error: "already_checked_in"
                stopSession:
                  summary: path=presence/qr/stop
                  value:
                    ok: true
                    data:
                      course_id: "cloud-101"
                      session_id: "cloud-101-p01"
                      meeting_key: "MTG-CLOUD-101-P01"
                      status: "stopped"
                      stopped_at: "2026-02-28T09:30:00.000Z"
                courseConfigUpdate:
                  summary: path=presence/course/config
                  value:
                    ok: true
                    data:
                      course_id: "cloud-101"
                      total_meetings: 14
                      updated_at: "2026-02-28T09:30:00.000Z"
                accelBatch:
                  summary: path=telemetry/accel
                  value:
                    ok: true
                    data:
                      accepted: 2
                gpsLog:
                  summary: path=telemetry/gps
                  value:
                    ok: true
                    data:
                      accepted: true
        '400':
          description: Error envelope
          content:
            application/json:
              examples:
                accelMissingDevice:
                  summary: path=telemetry/accel tanpa device_id
                  value:
                    ok: false
                    error: "missing_field: device_id"
                accelMissingSamples:
                  summary: path=telemetry/accel tanpa samples
                  value:
                    ok: false
                    error: "missing_field: samples"
                accelInvalidTimestamp:
                  summary: path=telemetry/accel dengan timestamp sample tidak valid
                  value:
                    ok: false
                    error: "invalid_timestamp: samples[0].t"
                accelInvalidNumber:
                  summary: path=telemetry/accel dengan angka sample tidak valid
                  value:
                    ok: false
                    error: "invalid_number: samples[0].x"

components:
  schemas:
    GenerateQRRequest:
      type: object
      required: [course_id, session_id, meeting_no]
      properties:
        course_id:
          type: string
          example: cloud-101
          description: Stored and matched in lowercase form.
        session_id:
          type: string
          example: cloud-101-p01
          description: Must match deterministic format `<course_id>-pNN` for the selected meeting number.
        meeting_no:
          type: integer
          minimum: 1
          maximum: 20
          example: 1
        owner_identifier:
          type: string
          example: "198701012020011001"
          description: Optional owner identifier of the lecturer who starts the meeting.
        meeting_key:
          type: string
          example: MTG-CLOUD-101-P01
          description: Optional field for backward compatibility. Backend uses deterministic meeting key.
        ts:
          type: string
          format: date-time

    CheckinRequest:
      type: object
      required: [user_id, device_id, course_id, session_id, qr_token]
      properties:
        user_id:
          type: string
          example: 2023xxxx
        device_id:
          type: string
          example: dev-001
        course_id:
          type: string
          example: cloud-101
          description: Matching is case-insensitive (normalized to lowercase).
        session_id:
          type: string
          example: sesi-02
          description: Matching is case-insensitive (normalized to lowercase).
        qr_token:
          type: string
          example: TKN-8F2A19
          description: Matching is case-insensitive (normalized to uppercase).
        ts:
          type: string
          format: date-time

    StopSessionRequest:
      type: object
      required: [course_id, session_id]
      properties:
        course_id:
          type: string
          example: cloud-101
          description: Session course ID to mark as closed.
        session_id:
          type: string
          example: cloud-101-senin-02-202602281626
          description: Session ID to mark as closed.
        owner_identifier:
          type: string
          example: "198701012020011001"
          description: Optional owner identifier for consistent stop across meeting state.
        meeting_key:
          type: string
          example: MTG-CLOUD-101-P01
          description: Optional meeting key. If provided, stop is applied to this meeting identity.
        ts:
          type: string
          format: date-time

    CourseMeetingConfigUpdateRequest:
      type: object
      required: [course_id, total_meetings]
      properties:
        course_id:
          type: string
          example: cloud-101
        total_meetings:
          type: integer
          minimum: 1
          maximum: 20
          example: 14
        ts:
          type: string
          format: date-time

    BatchAccelRequest:
      type: object
      required: [device_id, samples]
      properties:
        device_id:
          type: string
          example: dev-001
          description: Identitas perangkat pengirim batch accelerometer.
        ts:
          type: string
          format: date-time
          description: Timestamp batch (ISO-8601). Jika tidak dikirim, backend memakai waktu server.
        samples:
          type: array
          minItems: 1
          description: Daftar sample accelerometer yang akan disimpan dalam satu request.
          items:
            $ref: '#/components/schemas/AccelSamplePointRequest'

    AccelSamplePointRequest:
      type: object
      required: [t, x, y, z]
      properties:
        t:
          type: string
          format: date-time
          description: Timestamp sample accelerometer (ISO-8601).
          example: "2026-02-18T10:15:29.300Z"
        x:
          type: number
          description: Nilai sumbu X.
          example: 0.15
        y:
          type: number
          description: Nilai sumbu Y.
          example: 0.02
        z:
          type: number
          description: Nilai sumbu Z.
          example: 9.68

    AccelBatchResponseData:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: integer
          minimum: 0
          description: Jumlah sample accelerometer yang diterima backend dari request batch.
          example: 2

    AccelLatestResponseData:
      type: object
      properties:
        t:
          type: string
          format: date-time
          example: "2026-02-18T10:15:29.300Z"
        x:
          type: number
          example: 0.15
        y:
          type: number
          example: 0.02
        z:
          type: number
          example: 9.68
      description: |
        Sample accelerometer terbaru untuk `device_id`.
        Jika device belum punya data, backend mengembalikan object kosong (`{}`).

    AccelBatchEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/AccelBatchResponseData'

    AccelLatestEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/AccelLatestResponseData'

    LogGPSRequest:
      type: object
      required: [device_id, lat, lng]
      properties:
        device_id:
          type: string
          example: dev-001
        ts:
          type: string
          format: date-time
        lat:
          type: number
          format: double
          example: -7.2575
        lng:
          type: number
          format: double
          example: 112.7521
        accuracy_m:
          type: number
          format: double
          example: 12.5
        altitude_m:
          type: number
          format: double
          example: 450.0

